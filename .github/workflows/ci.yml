name: Dispatch CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs on the same branch/PR to save runner minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ── Scope note (DEV-FOUNDATION-002) ─────────────────────────────────────────
# This workflow runs deterministic, non-Docker checks: lint, typecheck,
# unit/foundation tests, and production builds for every workspace, plus the
# security review (dependency audit + secret scan), a docker-compose config
# validation (no containers are built or started in CI), and a dedicated
# database-integration job against a PostgreSQL service container.
#
# Full Docker build/start/health verification (docker-verify.sh), the
# database verification harness (db-verify.sh), and the Playwright E2E suite
# (e2e-local.sh / e2e-test.sh) are required LOCAL gates per CLAUDE.md, run by
# a human or Claude before declaring a task PASS — they are not run in this
# workflow to keep CI fast and reliable. This is an explicit, documented
# scope decision, not an oversight.

jobs:
  # ── Build, Lint, Typecheck, Test — all workspaces ───────────────────────────
  build-and-test:
    name: Build, Lint, Typecheck, Test
    runs-on: ubuntu-latest

    env:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_URL: http://localhost:6002
      # Schema-only placeholder — Prisma generate/validate never open a real
      # connection with it. No business/deploy step in this job uses it.
      DATABASE_URL: "postgresql://dispatch_user:ci_placeholder_not_a_real_secret@localhost:5432/dispatch?schema=public"
      # Deterministic test-only secret (AUTH-001) — never a production value.
      JWT_ACCESS_SECRET: "ci_test_only_jwt_access_secret_not_a_real_secret_value"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies (npm workspaces)
        run: npm ci

      - name: Prepare shared workspace packages (build packages/* before app typecheck/test)
        run: npm run build:packages

      - name: Prisma generate (schema-only, no database connection)
        run: npm run prisma:generate

      - name: Prisma validate (schema-only, no database connection)
        run: npm run prisma:validate

      - name: Lint (all workspaces)
        run: npm run lint

      - name: Typecheck (all workspaces)
        run: npm run typecheck

      - name: Unit/foundation tests (all workspaces)
        run: npm run test

      - name: Build packages/* then apps/api, apps/admin-web, apps/mobile-pwa
        run: npm run build

  # ── Compose — Config Validation ─────────────────────────────────────────────
  # Validates docker-compose.yml renders correctly. Does NOT build images or
  # start containers — that is docker-verify.sh, a required local gate.
  compose-config:
    name: Compose — Config Validation
    runs-on: ubuntu-latest

    env:
      POSTGRES_DB: dispatch
      POSTGRES_USER: dispatch_user
      POSTGRES_PASSWORD: ci_postgres_password_do_not_use_in_production
      NEXT_PUBLIC_API_URL: http://localhost:6002
      # Deterministic test-only secret (AUTH-001) — required by
      # docker-compose.yml's ${JWT_ACCESS_SECRET:?...} for `docker compose
      # config` to validate; never a production value.
      JWT_ACCESS_SECRET: "ci_test_only_jwt_access_secret_not_a_real_secret_value"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose config

  # ── Security — Audit & Secret Scan ──────────────────────────────────────────
  security-ci:
    name: Security — Audit & Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies (npm workspaces)
        run: npm ci

      - name: Run security review (audit + secret scan)
        run: ./scripts/security-audit.sh && ./scripts/secret-scan.sh

  # ── Database Integration (DEV-FOUNDATION-002) ───────────────────────────────
  # PostgreSQL 16 service container with test-only credentials (never real
  # secrets). Runs Prisma generate/validate, migrate deploy, the idempotent
  # system-role seed, and the database integration test suite. Never
  # deploys, never mutates Git state, never runs `prisma migrate reset`.
  db-integration:
    name: Database Integration
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: "postgresql://dispatch_ci_user:dispatch_ci_password_test_only@localhost:5432/dispatch_ci?schema=public"
      # Deterministic test-only secret/limits (AUTH-001) — never production
      # values. Generous rate limits avoid the auth e2e suite's many
      # sequential /auth/login and /auth/refresh calls tripping throttling.
      JWT_ACCESS_SECRET: "ci_test_only_jwt_access_secret_not_a_real_secret_value"
      AUTH_LOGIN_RATE_LIMIT: "1000:60"
      AUTH_REFRESH_RATE_LIMIT: "1000:60"

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: dispatch_ci
          POSTGRES_USER: dispatch_ci_user
          POSTGRES_PASSWORD: dispatch_ci_password_test_only
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dispatch_ci_user -d dispatch_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies (npm workspaces)
        run: npm ci

      - name: Prepare shared workspace packages
        run: npm run build:packages

      - name: Prisma generate
        run: npm run prisma:generate

      - name: Prisma validate
        run: npm run prisma:validate

      - name: Prisma migrate deploy
        run: npm run db:migrate:deploy

      - name: Idempotent system-role seed
        run: npm run db:seed

      - name: "Database integration tests (apps/api: test:integration, test:e2e — includes AUTH-001 auth.integration-spec/auth.e2e-spec)"
        run: npm run test:integration --workspace=apps/api && npm run test:e2e --workspace=apps/api

      - name: Confirm no default/automatically-created User exists
        run: |
          COUNT=$(PGPASSWORD=dispatch_ci_password_test_only psql -h localhost -U dispatch_ci_user -d dispatch_ci -tA -c "SELECT count(*) FROM users;")
          echo "User count after test suite cleanup: ${COUNT}"
          if [ "${COUNT}" != "0" ]; then
            echo "::error::Expected 0 Users after test cleanup, found ${COUNT}"
            exit 1
          fi
