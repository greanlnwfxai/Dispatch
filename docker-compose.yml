services:
  db:
    image: postgres:16
    container_name: dispatch-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dispatch}
      POSTGRES_USER: ${POSTGRES_USER:-dispatch_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set (see .env.example)}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # No host port mapping by default — db stays internal to the Docker
    # network per DEV-FOUNDATION-001 scope (no approved host-port requirement).

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: dispatch-api
    ports:
      - "6002:3000"
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-dispatch_user}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set (see .env.example)}@db:5432/${POSTGRES_DB:-dispatch}?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET must be set (see .env.example) — high-entropy, never committed}
      JWT_ACCESS_TTL_SECONDS: ${JWT_ACCESS_TTL_SECONDS:-900}
      JWT_ISSUER: ${JWT_ISSUER:-dispatch-api}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-dispatch-clients}
      AUTH_REFRESH_TTL_SECONDS: ${AUTH_REFRESH_TTL_SECONDS:-1209600}
      AUTH_SESSION_ABSOLUTE_TTL_SECONDS: ${AUTH_SESSION_ABSOLUTE_TTL_SECONDS:-2592000}
      AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME:-dispatch_refresh_token}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      AUTH_ALLOWED_ORIGINS: ${AUTH_ALLOWED_ORIGINS:-http://localhost:6001,http://localhost:6003}
      AUTH_LOGIN_RATE_LIMIT: ${AUTH_LOGIN_RATE_LIMIT:-5:60}
      AUTH_REFRESH_RATE_LIMIT: ${AUTH_REFRESH_RATE_LIMIT:-30:60}
      EVIDENCE_STORAGE_ROOT: /var/lib/dispatch/evidence
    volumes:
      - dispatch_evidence_data:/var/lib/dispatch/evidence
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  admin-web:
    build:
      context: .
      dockerfile: apps/admin-web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:6002}
    container_name: dispatch-admin-web
    ports:
      - "6001:6001"
    environment:
      PORT: 6001
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:6002}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  mobile-pwa:
    build:
      context: .
      dockerfile: apps/mobile-pwa/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:6002}
    container_name: dispatch-mobile-pwa
    ports:
      - "6003:6003"
    environment:
      PORT: 6003
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:6002}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  dispatch_evidence_data:
    driver: local
