services:
  db:
    image: postgres:16
    container_name: dispatch-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dispatch}
      POSTGRES_USER: ${POSTGRES_USER:-dispatch_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set (see .env.example)}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # No host port mapping by default — db stays internal to the Docker
    # network per DEV-FOUNDATION-001 scope (no approved host-port requirement).

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: dispatch-api
    ports:
      - "6002:3000"
    environment:
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  admin-web:
    build:
      context: .
      dockerfile: apps/admin-web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:6002}
    container_name: dispatch-admin-web
    ports:
      - "6001:6001"
    environment:
      PORT: 6001
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:6002}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  mobile-pwa:
    build:
      context: .
      dockerfile: apps/mobile-pwa/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:6002}
    container_name: dispatch-mobile-pwa
    ports:
      - "6003:6003"
    environment:
      PORT: 6003
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:6002}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
